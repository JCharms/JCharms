# Netlify build & hosting config for the J Charms storefront.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — React Router owns client-side routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"

# Security headers. Supabase Edge Functions hold all secrets server-side;
# nothing sensitive ships in the client bundle.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
